<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f2f5;
      font-family: sans-serif;
    }

    .calculadora {
      background-color: #333;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 300px;
    }

    .calculadora-tela {
      background-color: #222;
      color: #fff;
      height: 60px;
      margin-bottom: 20px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 15px;
      font-size: 1.5rem;
      word-break: break-all;
    }

    .teclado {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .action,
    .number {
      background-color: #444;
      color: white;
      height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      user-select: none;
    }

    .action:hover,
    .number:hover {
      background-color: #555;
    }

    .operacao {
      background-color: #f39c12;
    }

    .operacao:hover {
      background-color: #e67e22;
    }

    .limpar-c,
    .limpar-ce {
      background-color: #e74c3c;
    }

    .limpar-c:hover,
    .limpar-ce:hover {
      background-color: #c0392b;
    }

    .igual {
      background-color: #27ae60;
      grid-column: span 1;
    }

    .igual:hover {
      background-color: #219150;
    }

    .zero {
      grid-column: span 2;
    }
  </style>
</head>

<body>
  <div class="calculadora">
    <div class="calculadora-tela">0</div>

    <div class="teclado">
      <span class="action limpar-c">C</span>
      <span class="action limpar-ce">CE</span>
      <span class="action divisao operacao">/</span>
      <span class="action multiplicacao operacao">*</span>

      <span class="number tecla">7</span>
      <span class="number tecla">8</span>
      <span class="number tecla">9</span>
      <span class="action subtracao operacao">-</span>

      <span class="number tecla">4</span>
      <span class="number tecla">5</span>
      <span class="number tecla">6</span>
      <span class="action adicao operacao tecla">+</span>

      <span class="number tecla">1</span>
      <span class="number tecla">2</span>
      <span class="number tecla">3</span>
      <span class="action igual operacao tecla">=</span>

      <span class="number zero tecla">0</span>
      <span class="action">,</span>
    </div>
  </div>
  <script src="script.js"></script>
</body>

</html>
